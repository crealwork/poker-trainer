<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포커 마스터 - 텍사스 홀덤 배우기</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="header__title">🃏 포커 마스터</h1>
            <div class="header__progress">
                <div class="progress-bar">
                    <div class="progress-bar__fill" id="progressFill"></div>
                </div>
                <span class="progress-bar__text" id="progressText">0/6 완료</span>
            </div>
        </header>

        <div class="main">
            <nav class="sidebar" id="sidebar">
                <!-- Lesson nav items rendered by app.js -->
            </nav>

            <section class="content" id="content">
                <div class="welcome" id="welcome">
                    <h2>텍사스 홀덤을 배워보세요!</h2>
                    <p>6개의 레슨을 통해 포커의 기초부터 전략까지 배울 수 있습니다.</p>
                    <button class="btn btn--gold" id="startBtn">학습 시작하기</button>
                </div>
            </section>
        </div>

        <footer class="nav-buttons" id="navButtons" style="display:none;">
            <button class="btn btn--outline" id="prevBtn">← 이전</button>
            <button class="btn btn--gold" id="nextBtn">다음 →</button>
        </footer>
    </div>

    <script src="js/cards.js"></script>
    <script src="js/lessons.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
